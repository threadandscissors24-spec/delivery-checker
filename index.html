<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread and Scissors Alterations</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 100%;
        max-width: 500px;
        background: #fff;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      }

      h1 {
        text-align: center;
      }

      input {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
        font-size: 16px;
      }

      button {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: black;
        color: white;
        font-size: 16px;
        font-weight: bold;
      }

      #result {
        margin-top: 15px;
        padding: 12px;
        background: #f0f0f0;
        border-radius: 10px;
        min-height: 40px;
      }

      #debug {
        margin-top: 10px;
        font-size: 12px;
        color: red;
        white-space: pre-wrap;
      }
    </style>

    <script>
      let mapsReady = false;

      function googleMapsReady() {
        mapsReady = true;
        document.getElementById("debug").innerText += "Maps cargó correctamente\n";
      }

      const BASE_ADDRESS = "2976 4th St, Orlando, FL 32820, USA";

      function checkPrice() {
        const address = document.getElementById("address").value;
        const result = document.getElementById("result");
        const debug = document.getElementById("debug");

        debug.innerText = "";

        if (!mapsReady) {
          result.innerText = "Maps no está listo";
          debug.innerText += "mapsReady = false\n";
          return;
        }

        if (!window.google) {
          result.innerText = "Google no existe";
          debug.innerText += "window.google undefined\n";
          return;
        }

        if (!google.maps) {
          result.innerText = "google.maps no existe";
          debug.innerText += "google.maps undefined\n";
          return;
        }

        if (!google.maps.DistanceMatrixService) {
          result.innerText = "DistanceMatrixService no existe";
          debug.innerText += "DistanceMatrixService undefined\n";
          return;
        }

        result.innerText = "Checking...";

        const service = new google.maps.DistanceMatrixService();

        service.getDistanceMatrix(
          {
            origins: [BASE_ADDRESS],
            destinations: [address],
            travelMode: google.maps.TravelMode.DRIVING
          },
          function(response, status) {

            debug.innerText += "STATUS: " + status + "\n";

            if (status !== "OK") {
              result.innerText = "Error: " + status;
              return;
            }

            const element = response.rows[0].elements[0];

            debug.innerText += "ELEMENT STATUS: " + element.status + "\n";

            if (element.status !== "OK") {
              result.innerText = "Address error: " + element.status;
              return;
            }

            const miles = element.distance.value * 0.000621371;

            result.innerText = "Miles: " + miles.toFixed(2);
          }
        );
      }
    </script>

    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCZoyQa2zJeNiIaHyUekHtNaBEgdmQ16WY&callback=googleMapsReady"
      async
      defer>
    </script>

  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <h1>Check Delivery</h1>

        <input id="address" placeholder="Enter address">

        <button onclick="checkPrice()">Check Price</button>

        <div id="result"></div>
        <div id="debug"></div>

      </div>
    </div>
  </body>
</html>
