<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread and Scissors Alterations</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f7f7f7;
}

.wrap {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card {
  background:#fff;
  padding:25px;
  border-radius:20px;
  width:100%;
  max-width:500px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align:center;
}

input {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:black;
  color:white;
  font-weight:bold;
}

#result {
  margin-top:15px;
  padding:12px;
  background:#f0f0f0;
  border-radius:10px;
}
</style>

<script>
async function checkPrice() {
  const address = document.getElementById("address").value.trim();
  const result = document.getElementById("result");

  if (!address) {
    result.innerText = "Please enter your address.";
    return;
  }

  result.innerText = "Checking...";

  try {
    const res = await fetch(`/api/calculate?address=${encodeURIComponent(address)}`);
    const data = await res.json();

    if (data.status === "FREE") {
      result.innerText = "Your pickup & delivery cost is FREE.";
    }

    else if (data.status === "PAID") {
      result.innerText =
        "Your pickup & delivery cost is $" +
        data.price.toFixed(2) +
        ". Orders over $" +
        data.freeThreshold +
        " qualify for FREE pickup & delivery.";
    }

    else if (data.status === "OUT_OF_RANGE") {
      result.innerText =
        "Your address is outside our service range. Contact us at 689-332-6243.";
    }

    else {
      result.innerText = "Unable to calculate right now.";
    }

  } catch (e) {
    result.innerText = "Error connecting to server.";
  }
}
</script>

</head>

<body>
<div class="wrap">
  <div class="card">

    <h1>Check Pickup & Delivery Cost</h1>

    <input id="address" placeholder="Enter your address">

    <button onclick="checkPrice()">Check Price</button>

    <div id="result"></div>

  </div>
</div>
</body>
</html>
